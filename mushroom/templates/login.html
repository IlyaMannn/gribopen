{% extends "base.html" %}
{% block title %}Вход — Учёт грибов{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 text-emerald-700 rounded-2xl mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a4 4 0 0 0-4 4c0 1 .5 2 1 2.5C7 9 5 10.5 5 13c0 2 1 3.5 3 4v3a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-3c2-.5 3-2 3-4 0-2.5-2-4-4-4.5.5-.5 1-1.5 1-2.5a4 4 0 0 0-4-4Z"/></svg>
            </div>
            <h1 class="text-2xl font-semibold text-gray-900">Учёт грибов</h1>
            <p class="text-sm text-gray-500 mt-1">Войдите в систему</p>
        </div>

        <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
            {% if error %}
                <div class="px-3 py-2 bg-red-50 text-red-800 border border-red-200 rounded-lg text-sm">
                    {{ error }}
                </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
                <input type="text" name="username" required autofocus
                       value="admin"
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700 transition">
                Войти
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-4">
            Локальное приложение. Данные хранятся на этом устройстве.
        </p>
    </div>
</div>
{% endblock %}

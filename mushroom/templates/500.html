{% extends "base.html" %}
{% block title %}Ошибка — Учёт грибов{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center py-12">
    <p class="text-6xl font-bold text-red-200">500</p>
    <h1 class="text-xl font-semibold text-gray-900 mt-3">Что-то пошло не так</h1>
    <p class="text-sm text-gray-600 mt-2">Ошибка записана в лог. Попробуйте обновить страницу или вернуться на главную.</p>
    <a href="{{ url_for('home') }}"
       class="inline-block mt-5 px-5 py-2.5 bg-emerald-600 text-white rounded-lg font-medium hover:bg-emerald-700">
        На главную
    </a>
</div>
{% endblock %}

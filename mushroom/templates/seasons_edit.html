{% extends "base.html" %}
{% block title %}Редактирование сезона — Учёт грибов{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-4">
    <h1 class="text-xl font-semibold text-gray-900 px-1">Редактировать сезон</h1>

    <form method="post" class="bg-white rounded-2xl border border-gray-200 p-4 space-y-3">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Название</label>
            <input type="text" name="name" required maxlength="60" value="{{ s.name }}"
                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата начала</label>
                <input type="date" name="start_date" value="{{ s.start_date }}" required
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата окончания (необязательно)</label>
                <input type="date" name="end_date" value="{{ s.end_date or '' }}"
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>
        </div>
        <p class="text-xs text-gray-500">Если оставить дату окончания пустой — сезон считается активным до закрытия.</p>
        <div class="flex gap-2 pt-2">
            <button type="submit"
                    class="flex-1 bg-emerald-600 text-white py-3 rounded-lg font-medium hover:bg-emerald-700 transition">
                Сохранить
            </button>
            <a href="{{ url_for('seasons') }}"
               class="px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium">
                Отмена
            </a>
        </div>
    </form>
</div>
{% endblock %}

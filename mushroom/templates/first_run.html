{% extends "base.html" %}
{% block title %}Создание сезона{% endblock %}

{% block content %}
<div class="max-w-md mx-auto pt-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
        <h1 class="text-xl font-semibold text-gray-900 mb-1">Создайте первый сезон</h1>
        <p class="text-sm text-gray-500 mb-5">Сезон — это период закупки и переработки. Обычно длится несколько недель.</p>

        {% if error %}
            <div class="mb-4 px-3 py-2 bg-red-50 text-red-800 border border-red-200 rounded-lg text-sm">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Название сезона</label>
                <input type="text" name="name" required autofocus
                       placeholder="Например: Осень 2026"
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата начала</label>
                <input type="date" name="start_date" required value="{{ today }}"
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700 transition">
                Создать сезон
            </button>
        </form>
    </div>
</div>
{% endblock %}

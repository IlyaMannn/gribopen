{% extends "base.html" %}
{% block title %}{{ title }} — Учёт грибов{% endblock %}

{% block content %}
<div class="max-w-md mx-auto pt-8">
    <div class="bg-white rounded-2xl border border-gray-200 p-8 text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-gray-100 text-gray-500 rounded-2xl mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <h1 class="text-xl font-semibold text-gray-900">{{ title }}</h1>
        <p class="text-sm text-gray-500 mt-2">Этот раздел появится в <strong>Этапе {{ stage }}</strong>.</p>
        <a href="{{ url_for('home') }}"
           class="inline-block mt-6 px-5 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition">
            На главную
        </a>
    </div>
</div>
{% endblock %}
